<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TAO Tracker</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004b87">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Initial Loading Screen -->
    <div id="loader" class="loader active">
        <div class="spinner"></div>
        <p>Téléchargement des données TAO...</p>
        <small>Ce processus peut prendre quelques secondes lors de la première ouverture.</small>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Header Overlay -->
    <header class="app-header">
        <div class="search-bar">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un arrêt...">
            <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <!-- Search Results Dropdown -->
        <div id="searchResults" class="search-results hidden">
            <ul id="searchList"></ul>
        </div>
    </header>

    <!-- Floating Action Buttons -->
    <div class="floating-controls">
        <button id="btnLocate" class="fab" aria-label="Ma position">
            <i class="fa-solid fa-location-crosshairs"></i>
        </button>
        <button id="btnFavsMenu" class="fab" aria-label="Voir favoris">
            <i class="fa-solid fa-star"></i>
        </button>
    </div>

    <!-- Bottom Sheet (Stop Info) -->
    <div id="bottomSheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <h2 id="sheetTitle">Nom de l'arrêt</h2>
            <button id="btnFavorite" class="icon-btn fav-btn"><i class="fa-regular fa-star"></i></button>
            <button id="btnCloseSheet" class="icon-btn"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="sheet-content">
            <div id="sheetLoader" class="loader-small hidden"></div>
            <ul id="arrivalsList" class="arrivals-list">
                <!-- Arrivals injected here via JS -->
                <li class="empty-state">Appuyez sur un arrêt pour voir les bus.</li>
            </ul>
        </div>
    </div>

    <!-- Favorites Modal -->
    <div id="favModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Mes Arrêts Favoris</h2>
                <button id="btnCloseFav" class="icon-btn"><i class="fa-solid fa-times"></i></button>
            </div>
            <ul id="favList" class="fav-list">
                <li class="empty-state">Aucun favori enregistré.</li>
            </ul>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
